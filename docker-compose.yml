services:
  backend:
    image: python:3.11-slim
    working_dir: /app/backend
    volumes:
      - ./backend:/app/backend
    environment:
      - DATABASE_URL=sqlite:///./wm2026.db
      - CORS_ORIGINS=["http://localhost:3000"]
    command: sh -c "pip install -e . && uvicorn api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=wm2026
      - POSTGRES_USER=wm
      - POSTGRES_PASSWORD=wm
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
